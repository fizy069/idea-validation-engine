services:
  - type: web
    name: oasis-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: oasis-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SQLITE_DB_PATH
        value: /var/data/validations.db
      - key: RUNS_DIR
        value: /var/data/runs
      - key: MARKET_MODEL
        value: gpt-4o-mini
      - key: JUDGE_MODEL
        value: gpt-4o-mini
      - key: SIMULATE_RATE_LIMIT_MAX_REQUESTS
        value: "3"
      - key: SIMULATE_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
